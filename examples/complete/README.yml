title: "Complete Example"
description: "This example demonstrates a public (REGIONAL) API Gateway REST API with a custom domain via domain_names and an optional Route53 alias via dns_records."
main_purpose: "The main purpose is to configure a public REST API Gateway with a REGIONAL custom domain (ACM) and a Route53 A-alias."
key_features:
  - "**Public Regional API**: Configures a REST API reachable through the default public `execute-api` endpoint (`types = [\"REGIONAL\"]`), no VPC Endpoint required."
  - "**Custom Domain**: Declares the FQDN and `certificate_arn` under `domain_names`; `dns_records` creates the matching Route53 alias (omit or set `{}` for external DNS)."
